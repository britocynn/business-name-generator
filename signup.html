<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #3c2b16 0%, #1b1712 22%, #121212 58%, #0f0f0f 100%);
      color: #f5ead9;
      text-align: center;
      padding: 40px 20px;
    }
    .box {
      max-width: 500px;
      margin: auto;
      background: linear-gradient(180deg, #f8f0e3 0%, #efdfc5 100%);
      color: #2b241c;
      padding: 30px 20px;
      border-radius: 20px;
    }
    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid #d7c3a1;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      border: none;
      background: linear-gradient(135deg, #d6a84f, #9c6a26);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    a {
      color: #7a5b34;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Create account</h1>
    <p>Sign up to access your premium tools later.</p>

    <input type="email" id="email" placeholder="Your email" />
    <input type="password" id="password" placeholder="Your password" />

    <button onclick="handleSignup()">Create account</button>

    <p>Already have an account? <a href="/login.html">Log in</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    async function handleSignup() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Please fill in all fields.");
        return;
      }

      const result = await signUpUser(email, password);

      if (result) {
        alert("Account created successfully. You can now log in.");
        window.location.href = "/login.html";
      }
    }
  </script>
</body>
</html>
