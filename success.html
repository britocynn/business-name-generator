<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #3c2b16 0%, #1b1712 22%, #121212 58%, #0f0f0f 100%);
      color: #f5ead9;
      text-align: center;
      padding: 60px 20px;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: linear-gradient(180deg, #f8f0e3 0%, #efdfc5 100%);
      color: #2b241c;
      padding: 40px;
      border-radius: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 14px 20px;
      border-radius: 12px;
      background: linear-gradient(135deg, #d6a84f, #9c6a26);
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Payment Successful 🎉</h1>
    <p>Your premium access is being activated.</p>
    <p>You can now return to your account.</p>

    <a href="/account.html">Go to My Account</a>
</div>

<script>
  localStorage.setItem("premiumUser", "true");
  window.location.href = "/";
</script>

</body>
</html>
