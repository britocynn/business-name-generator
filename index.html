<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Name Generator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #3c2b16 0%, #1b1712 22%, #121212 58%, #0f0f0f 100%);
      color: #f5ead9;
      text-align: center;
      padding: 36px 18px 60px;
      min-height: 100vh;
    }

    .container {
      max-width: 840px;
      margin: 0 auto;
      background: linear-gradient(180deg, #f8f0e3 0%, #efdfc5 100%);
      color: #2b241c;
      padding: 32px 22px 30px;
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(214, 178, 104, 0.35);
    }

    .title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e0bb73, #9f6924);
      color: #fff8ee;
      font-size: 20px;
      box-shadow: 0 8px 18px rgba(156, 108, 40, 0.28);
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
      line-height: 1.15;
      color: #241d17;
      letter-spacing: -0.5px;
    }

    p#subtitle {
      margin: 10px 0 26px;
      color: #5d5042;
      font-size: 1.05rem;
    }

    .field-label {
      text-align: left;
      display: block;
      font-weight: 700;
      margin: 16px 0 8px;
      color: #3d3125;
      font-size: 0.95rem;
    }

    select,
    input {
      width: 100%;
      padding: 14px 16px;
      margin: 0;
      border-radius: 14px;
      border: 1px solid #d7c3a1;
      font-size: 16px;
      outline: none;
      background: #fffaf2;
      color: #2b241c;
      transition: all 0.2s ease;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
    }

    select:focus,
    input:focus {
      border-color: #b88234;
      box-shadow: 0 0 0 4px rgba(184, 130, 52, 0.14);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 22px;
    }

    button {
      border: none;
      padding: 14px 22px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    #generateBtn,
    #moreBtn {
      background: linear-gradient(135deg, #d6a84f, #9c6a26);
      color: #fff9f0;
      box-shadow: 0 10px 20px rgba(156, 106, 38, 0.22);
    }

    #copyBtn {
      background: #2d241b;
      color: #f7ead2;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.14);
    }

    #premiumBtn {
      background: linear-gradient(135deg, #2b241c, #5a4630);
      color: #f7ead2;
      box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    }

    #copyBtn,
    #moreBtn {
      display: none;
    }

    .result {
      margin-top: 28px;
      text-align: left;
      background: #fffaf4;
      padding: 20px;
      border-radius: 18px;
      border: 1px solid #ead6b4;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
      display: none;
    }

    .result-title {
      margin: 0 0 16px;
      color: #8b5e1b;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .idea {
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      background: linear-gradient(180deg, #fffdf9 0%, #f8f0e3 100%);
      border: 1px solid #eddcbc;
      line-height: 1.5;
    }

    .idea:last-child {
      margin-bottom: 0;
    }

    .name-tag {
      display: inline-block;
      margin-bottom: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #ead7b1;
      color: #5f451f;
    }

    .premium-box {
      margin-top: 22px;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2b241c, #5a4630);
      color: #f7ead2;
      text-align: left;
      box-shadow: 0 12px 22px rgba(0,0,0,0.18);
    }

    .premium-box h3 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .premium-box p {
      margin: 0 0 14px;
      color: #f1dfc0;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .footer-note {
      margin-top: 26px;
      color: #6b5c49;
      font-size: 0.92rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 12px 40px;
      }

      .container {
        padding: 24px 16px 22px;
        border-radius: 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        font-size: 17px;
      }

      .btn-row {
        flex-direction: column;
      }

      #generateBtn,
      #copyBtn,
      #moreBtn,
      #premiumBtn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title-wrap">
      <span class="logo-icon">✦</span>
      <h1 id="title">Business Name Generator</h1>
      <span class="logo-icon">✦</span>
    </div>

    <p id="subtitle">Generate brandable business names in seconds</p>

    <label class="field-label" id="languageLabel" for="language">Language</label>
    <select id="language" onchange="updateLanguage()">
      <option value="en">English</option>
      <option value="pt">Português</option>
    </select>

    <label class="field-label" id="interestLabel" for="interest">Business niche or keyword</label>
    <input id="interest" placeholder="E.g. accounting, beauty, fitness, consulting" />

    <div class="btn-row">
      <button id="generateBtn" onclick="generateIdeas()">Generate Free Names</button>
      <button id="moreBtn" onclick="generateMoreIdeas()">Generate More Names</button>
      <button id="copyBtn" onclick="copyIdeas()">Copy Names</button>
      <button id="premiumBtn" onclick="unlockPremium()">Unlock Premium Names</button>
    </div>

    <div id="result" class="result"></div>

    <div class="premium-box" id="premiumBox">
      <h3 id="premiumTitle">Unlock premium brand names</h3>
      <p id="premiumText">Get stronger, more memorable and more brandable name ideas with the premium version.</p>
      <button id="premiumBtnBox" onclick="unlockPremium()">Unlock Premium Names</button>
    </div>

    <div class="footer-note" id="footerNote">Smart tools for modern entrepreneurs</div>
  </div>

  <script>
    let currentInterest = "";
    let currentLanguage = "en";
    let currentMode = "free";

    const stripeLink = "YOUR_STRIPE_PAYMENT_LINK_HERE";

    const freePrefixesEn = [
      "Prime", "Nova", "Urban", "Golden", "Next", "Pure", "Elevate", "Bright",
      "Apex", "Bold", "Smart", "Vertex", "Core", "Modern", "Blue", "Elite",
      "True", "Future", "First", "Vision", "Swift", "Clear", "Strong", "Peak"
    ];

    const freeSuffixesEn = [
      "Studio", "Lab", "Hub", "Works", "Group", "Solutions", "Collective", "Nest",
      "Flow", "Point", "Factory", "Base", "Forge", "Bridge", "House", "Corner",
      "Space", "Network", "Spark", "Center", "Co", "Project", "Zone", "System"
    ];

    const freePrefixesPt = [
      "Nova", "Prime", "Dourada", "Eleva", "Viva", "Brilho", "Alta", "Pura",
      "Visão", "Forte", "Centro", "Base", "Ponto", "Casa", "Essência", "Clara",
      "Moderna", "Rumo", "Nobre", "Valor", "Horizonte", "Raiz", "Impulso", "Vértice"
    ];

    const freeSuffixesPt = [
      "Studio", "Lab", "Hub", "Works", "Grupo", "Soluções", "Coletivo", "Casa",
      "Fluída", "Ponto", "Fábrica", "Base", "Oficina", "Ponte", "Espaço", "Rede",
      "Faísca", "Centro", "Projeto", "Zona", "Sistema", "Marca", "Ateliê", "Nicho"
    ];

    const premiumRootsEn = [
      "Vel", "Zen", "Sol", "Nex", "Alt", "Lum", "Ver", "Vir", "Nor", "Xen",
      "Aure", "Celo", "Mira", "Tera", "Livo", "Sora", "Vanta", "Rivo", "Axi", "Elva",
      "Orin", "Navi", "Zyra", "Kairo", "Vero", "Zento", "Avol", "Lunor", "Selva", "Trevo"
    ];

    const premiumEndingsEn = [
      "ora", "ara", "ivo", "ion", "ella", "anta", "ero", "ava", "ix", "ary",
      "ium", "ique", "ara", "ora", "enzo", "ique", "aris", "eva", "uno", "aris"
    ];

    const premiumTailEn = [
      "", "", "", " Studio", " Labs", " Group", " House", " Works", " Co", " Systems"
    ];

    const premiumRootsPt = [
      "Vel", "Sol", "Nex", "Alt", "Lum", "Ver", "Nor", "Aure", "Mira", "Tera",
      "Livo", "Sora", "Vanta", "Rivo", "Elva", "Orin", "Nora", "Cora", "Zira", "Avel",
      "Clari", "Doura", "Viva", "Brava", "Sera", "Véria", "Alva", "Nobre", "Prisma", "Lívia"
    ];

    const premiumEndingsPt = [
      "ora", "ara", "iva", "ella", "anta", "eva", "ina", "aris", "una", "ira",
      "ena", "ália", "éria", "ina", "ora", "aris"
    ];

    const premiumTailPt = [
      "", "", "", " Studio", " Atelier", " Grupo", " House", " Lab", " Marca", " Co"
    ];

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function capitalizeText(text) {
      if (!text) return "";
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function sanitizeWord(text) {
      return text
        .trim()
        .replace(/\s+/g, " ")
        .split(" ")
        .map(word => capitalizeText(word))
        .join(" ");
    }

    function generateFreeNames(keyword, language) {
      const names = [];
      const used = new Set();
      const safeKeyword = sanitizeWord(keyword);

      const prefixes = language === "pt" ? freePrefixesPt : freePrefixesEn;
      const suffixes = language === "pt" ? freeSuffixesPt : freeSuffixesEn;

      while (names.length < 5) {
        const style = Math.floor(Math.random() * 4);
        let candidate = "";

        if (style === 0) {
          candidate = `${randomItem(prefixes)} ${safeKeyword}`;
        } else if (style === 1) {
          candidate = `${safeKeyword} ${randomItem(suffixes)}`;
        } else if (style === 2) {
          candidate = `${randomItem(prefixes)} ${safeKeyword} ${randomItem(suffixes)}`;
        } else {
          candidate = `${randomItem(prefixes)} ${randomItem(suffixes)}`;
        }

        if (!used.has(candidate)) {
          used.add(candidate);
          names.push(candidate);
        }
      }

      return names;
    }

    function generatePremiumNames(keyword, language) {
      const names = [];
      const used = new Set();
      const safeKeyword = sanitizeWord(keyword);

      const roots = language === "pt" ? premiumRootsPt : premiumRootsEn;
      const endings = language === "pt" ? premiumEndingsPt : premiumEndingsEn;
      const tails = language === "pt" ? premiumTailPt : premiumTailEn;

      while (names.length < 5) {
        const style = Math.floor(Math.random() * 4);
        let candidate = "";

        const invented = `${randomItem(roots)}${randomItem(endings)}`;
        const invented2 = `${randomItem(roots)}${randomItem(endings)}`;

        if (style === 0) {
          candidate = `${invented}`;
        } else if (style === 1) {
          candidate = `${invented}${randomItem(tails)}`;
        } else if (style === 2) {
          candidate = `${invented} ${safeKeyword}`;
        } else {
          candidate = `${invented2}${randomItem(tails)}`;
        }

        candidate = candidate.replace(/\s+/g, " ").trim();

        if (!used.has(candidate)) {
          used.add(candidate);
          names.push(candidate);
        }
      }

      return names;
    }

    function updateLanguage() {
      const language = document.getElementById("language").value;
      currentLanguage = language;

      if (language === "pt") {
        document.getElementById("title").innerText = "Gerador de Nomes de Negócio";
        document.getElementById("subtitle").innerText = "Gera nomes de negócio mais fortes e brandáveis em segundos";
        document.getElementById("languageLabel").innerText = "Idioma";
        document.getElementById("interestLabel").innerText = "Nicho ou palavra-chave do negócio";
        document.getElementById("interest").placeholder = "Ex.: contabilidade, beleza, fitness, consultoria";
        document.getElementById("generateBtn").innerText = "Gerar Nomes Grátis";
        document.getElementById("moreBtn").innerText = "Gerar Mais Nomes";
        document.getElementById("copyBtn").innerText = "Copiar Nomes";
        document.getElementById("premiumBtn").innerText = "Desbloquear Nomes Premium";
        document.getElementById("premiumBtnBox").innerText = "Desbloquear Nomes Premium";
        document.getElementById("premiumTitle").innerText = "Desbloqueia nomes premium";
        document.getElementById("premiumText").innerText = "Obtém nomes mais fortes, mais memoráveis e muito mais brandáveis com a versão premium.";
        document.getElementById("footerNote").innerText = "Ferramentas inteligentes para empreendedores modernos";
        document.title = "Gerador de Nomes de Negócio";
      } else {
        document.getElementById("title").innerText = "Business Name Generator";
        document.getElementById("subtitle").innerText = "Generate stronger, more brandable business names in seconds";
        document.getElementById("languageLabel").innerText = "Language";
        document.getElementById("interestLabel").innerText = "Business niche or keyword";
        document.getElementById("interest").placeholder = "E.g. accounting, beauty, fitness, consulting";
        document.getElementById("generateBtn").innerText = "Generate Free Names";
        document.getElementById("moreBtn").innerText = "Generate More Names";
        document.getElementById("copyBtn").innerText = "Copy Names";
        document.getElementById("premiumBtn").innerText = "Unlock Premium Names";
        document.getElementById("premiumBtnBox").innerText = "Unlock Premium Names";
        document.getElementById("premiumTitle").innerText = "Unlock premium brand names";
        document.getElementById("premiumText").innerText = "Get stronger, more memorable and more brandable name ideas with the premium version.";
        document.getElementById("footerNote").innerText = "Smart tools for modern entrepreneurs";
        document.title = "Business Name Generator";
      }
    }

    function renderIdeas() {
      const keyword = currentInterest.trim();
      const language = currentLanguage;

      let names = [];
      if (currentMode === "premium") {
        names = generatePremiumNames(keyword, language);
      } else {
        names = generateFreeNames(keyword, language);
      }

      let html = "";
      if (language === "pt") {
        html += `<div class="result-title">Nomes gerados para: <b>${sanitizeWord(keyword)}</b></div>`;
      } else {
        html += `<div class="result-title">Names generated for: <b>${sanitizeWord(keyword)}</b></div>`;
      }

      names.forEach((name, index) => {
        html += `<div class="idea">`;
        html += `<div class="name-tag">${currentMode === "premium" ? (language === "pt" ? "PREMIUM" : "PREMIUM") : (language === "pt" ? "GRÁTIS" : "FREE")}</div>`;
        html += `<div><b>${index + 1}. ${name}</b></div>`;
        html += `</div>`;
      });

      document.getElementById("result").innerHTML = html;
      document.getElementById("result").style.display = "block";
      document.getElementById("copyBtn").style.display = "inline-block";
      document.getElementById("moreBtn").style.display = "inline-block";
    }

    function generateIdeas() {
      const keyword = document.getElementById("interest").value.trim();
      const language = document.getElementById("language").value;

      if (keyword === "") {
        if (language === "pt") {
          alert("Introduz um nicho ou palavra-chave.");
        } else {
          alert("Please enter a niche or keyword.");
        }
        return;
      }

      currentInterest = keyword;
      currentLanguage = language;
      currentMode = "free";
      renderIdeas();
    }

    function generateMoreIdeas() {
      if (!currentInterest.trim()) {
        if (currentLanguage === "pt") {
          alert("Gera primeiro os nomes iniciais.");
        } else {
          alert("Generate the first names before asking for more.");
        }
        return;
      }

      renderIdeas();
    }

    function copyIdeas() {
      const resultText = document.getElementById("result").innerText;
      const language = document.getElementById("language").value;

      if (!resultText.trim()) {
        if (language === "pt") {
          alert("Ainda não há nomes para copiar.");
        } else {
          alert("There are no names to copy yet.");
        }
        return;
      }

      navigator.clipboard.writeText(resultText).then(function () {
        if (language === "pt") {
          alert("Nomes copiados!");
        } else {
          alert("Names copied!");
        }
      });
    }

    function unlockPremium() {
      window.location.href = stripeLink;
    }

    updateLanguage();
  </script>
</body>
</html>
